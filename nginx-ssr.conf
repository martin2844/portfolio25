worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Temp paths
    client_body_temp_path /tmp/nginx/client_body;
    proxy_temp_path /tmp/nginx/proxy;
    fastcgi_temp_path /tmp/nginx/fastcgi;
    uwsgi_temp_path /tmp/nginx/uwsgi;
    scgi_temp_path /tmp/nginx/scgi;
    
    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 15;
    types_hash_max_size 2048;
    client_max_body_size 8M;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/atom+xml
        image/svg+xml;
    
    # Redirect www to canonical non-www HTTPS (also strips trailing slashes in one hop)
    server {
        listen 8080;
        server_name www.martinchammah.dev;
        if ($request_uri ~ ^(.+)/(\?.*)?$) {
            return 301 https://martinchammah.dev$1$2;
        }
        return 301 https://martinchammah.dev$request_uri;
    }

    server {
        listen 8080 default_server;
        server_name martinchammah.dev localhost;
        root /var/www;
        index index.php;

        # Determine actual request scheme (respect reverse proxy headers)
        set $actual_scheme $scheme;
        if ($http_x_forwarded_proto) {
            set $actual_scheme $http_x_forwarded_proto;
        }

        # Redirect HTTP to HTTPS with a 301 permanent redirect (only for production domains)
        # Localhost / bare-IP access keeps working for local Docker testing and health checks.
        set $prod_host "";
        if ($host ~ ^(www\.)?martinchammah\.dev$) {
            set $prod_host "1";
        }
        set $redirect_https "";
        if ($prod_host = "1") {
            set $redirect_https "1";
        }
        if ($actual_scheme != "https") {
            set $redirect_https "${redirect_https}2";
        }
        if ($redirect_https = "12") {
            return 301 https://martinchammah.dev$request_uri;
        }

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

        location = /og-image.jpg {
            alias /var/www/public/og-image.jpg;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Frame-Options DENY always;
            add_header X-Content-Type-Options nosniff always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        }
        
        # Static files cache
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
            add_header X-Frame-Options DENY always;
            add_header X-Content-Type-Options nosniff always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        }
        
        # PHP files
        location / {
            # Redirect trailing-slash URLs to non-trailing-slash versions (301)
            if ($request_uri ~ ^(.+)/(\?.*)?$) {
                return 301 $1$2;
            }
            try_files $uri $uri/ /index.php$is_args$args;
        }
        
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            
            # Cache headers for PHP pages
            add_header Cache-Control "public, max-age=300";
            
            # Security headers (repeated because nginx add_header is not inherited)
            add_header X-Frame-Options DENY always;
            add_header X-Content-Type-Options nosniff always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
            
            # Buffer optimization
            fastcgi_buffering on;
            fastcgi_buffer_size 32k;
            fastcgi_buffers 8 32k;
            fastcgi_busy_buffers_size 64k;
        }
        
        # Hide sensitive files
        location ~ /\. {
            deny all;
        }
        
        location ~ \.(yaml|yml|md)$ {
            deny all;
        }
    }
}
