<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200, initial-scale=1">
  <title>Martin Chammah OG Image</title>
  <style>
    @font-face {
      font-family: "AT Season Sans";
      font-style: normal;
      font-weight: 100 900;
      src: url("../public/fonts/ATSeasonSansVF.woff2") format("woff2");
    }

    @font-face {
      font-family: "Geist";
      font-style: normal;
      font-weight: 100 900;
      src: url("../public/fonts/Geist.woff2") format("woff2");
    }

    @font-face {
      font-family: "Geist Mono";
      font-style: normal;
      font-weight: 100 900;
      src: url("../public/fonts/GeistMono.woff2") format("woff2");
    }

    :root {
      --bg: #ffffff;
      --text: #0a0a0a;
      --muted: #666666;
      --border: #0a0a0a;
      --accent: #dc2626;
      --soft: #f5f5f5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 1200px;
      height: 630px;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Geist", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .canvas {
      position: relative;
      width: 1200px;
      height: 630px;
      padding: 56px 64px 48px;
      background:
        linear-gradient(90deg, transparent 0 63px, rgba(10, 10, 10, 0.045) 63px 64px, transparent 64px 100%),
        linear-gradient(180deg, transparent 0 55px, rgba(10, 10, 10, 0.045) 55px 56px, transparent 56px 100%),
        var(--bg);
      background-size: 96px 96px, 96px 96px, auto;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      border-top: 4px solid var(--border);
      padding-top: 18px;
    }

    .brand {
      font-family: "AT Season Sans", "Helvetica Neue", Arial, sans-serif;
      font-size: 34px;
      line-height: 0.95;
      font-weight: 850;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .meta {
      font-family: "Geist Mono", "SF Mono", Consolas, monospace;
      font-size: 18px;
      line-height: 1.35;
      font-weight: 520;
      color: var(--muted);
      text-align: right;
      text-transform: uppercase;
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 275px;
      gap: 54px;
      align-items: end;
      height: 388px;
      border-bottom: 4px solid var(--border);
      padding-bottom: 38px;
    }

    h1 {
      max-width: 820px;
      margin: 0;
      font-family: "AT Season Sans", "Helvetica Neue", Arial, sans-serif;
      font-size: 72px;
      line-height: 0.94;
      font-weight: 880;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .accent {
      color: var(--accent);
    }

    .panel {
      align-self: stretch;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-left: 4px solid var(--border);
      padding-left: 24px;
    }

    .label {
      margin-bottom: 16px;
      font-family: "Geist Mono", "SF Mono", Consolas, monospace;
      font-size: 16px;
      line-height: 1;
      color: var(--muted);
      text-transform: uppercase;
    }

    .stack {
      display: grid;
      gap: 10px;
      font-family: "Geist Mono", "SF Mono", Consolas, monospace;
      font-size: 24px;
      line-height: 1.1;
      font-weight: 650;
      text-transform: uppercase;
    }

    .tag {
      width: max-content;
      max-width: 100%;
      padding: 7px 11px 8px;
      background: var(--soft);
      border: 2px solid var(--border);
    }

    .rule {
      width: 100%;
      height: 18px;
      background: var(--accent);
      margin-top: 22px;
    }

    .metrics {
      display: grid;
      gap: 8px;
      font-family: "Geist Mono", "SF Mono", Consolas, monospace;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 520;
      color: var(--muted);
      text-transform: uppercase;
    }

    .metrics strong {
      color: var(--accent);
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="canvas">
    <div class="topbar">
      <div class="brand">martin_chammah</div>
      <div class="meta">software_engineer<br>barcelona<br>martinchammah.dev</div>
    </div>

    <section class="main">
      <h1>Full-stack engineer building fast, pragmatic web products<span class="accent">.</span></h1>
      <aside class="panel" aria-label="Core stack">
        <div>
          <div class="label">stack</div>
          <div class="stack">
            <span class="tag">TypeScript</span>
            <span class="tag">Next.js</span>
            <span class="tag">SQL</span>
            <span class="tag">Go</span>
          </div>
        </div>
        <div>
          <div class="metrics">
            <span><strong>51</strong> posts</span>
            <span><strong>4</strong> projects</span>
            <span><strong>13</strong> notes</span>
          </div>
          <div class="rule"></div>
        </div>
      </aside>
    </section>
  </main>
</body>
</html>
