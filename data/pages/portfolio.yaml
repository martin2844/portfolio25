projects:
  - name: "CleanCut Video"
    description: "Desktop app that auto-cuts silences from talking videos and adds subtitles locally. Runs on Windows, macOS and Linux with no uploads and no subscription."
    technologies: ["electron", "react", "typescript", "vite", "ffmpeg"]
    websiteLink: "https://cleancut.video"
    image: "/public/projects/cleancut-og.jpg"

  - name: "clasfic.ar"
    description: "Autonomous vehicle plate-data aggregation platform. Ingests classified listings from multiple sources, enriches them with AI, and provides plate-based query services for Argentine vehicle data."
    technologies: ["nextjs", "nodejs", "postgresql", "docker", "puppeteer"]
    websiteLink: "https://clasfic.ar"
    image: "/public/projects/clasific-og.jpg"

  - name: "proyect.ar"
    description: "AI architectural rendering platform for the Argentine market. Upload sketches, plans or 3D models and get photorealistic renders in minutes, paying in pesos via MercadoPago."
    technologies: ["nextjs", "typescript", "sqlite", "openai", "mercadopago"]
    websiteLink: "https://proyect.ar"
    image: "/public/projects/proyectar-og.jpg"

  - name: "Knext"
    description: "A Next.js starter template with NextAuth, TailwindCSS, SQLite and Knex. Ships with migrations, Docker setup and GitHub auth out of the box — built for shipping fast."
    technologies: ["nextjs", "nextauth", "tailwindcss", "sqlite", "knex"]
    githubLink: "https://github.com/martin2844/knext"
    image: "/public/projects/knext-og.jpg"
