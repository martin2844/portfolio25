    websiteLink: "https://files.codigomate.com"
    image: "https://cloud.codigomate.com/8tet6o.png"
  
  - name: "Knext"
    description: "A Next.js, knex and sqlite starter template. Built in auth too. You wanna ship fast? combine this with coolify, v0, and cursor and ship projects in a day"
