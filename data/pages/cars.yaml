cars:
  - make: "Volkswagen"
    model: "Gol Power 1.4l"
    year: 2011
    description: "My first car, got it from new. I had it for 4 years, it was the longest car I've ever had, I loved it. It took me to school and work, and I was daily driving it for about 100km a day. I sold it a little bit above 100k km mark. Some trips I did with the car involved a 15.000 km trip all around argentina, where we touched almost all provinces and also went into Patagonia. Never broke down, always reliable. I loved this car. Had it from 18 years old to 22 years old. I grew a lot, the car changed too, I wrapped it, changed the tail lights, and unrwapped it and sold it eventually bone stock."
