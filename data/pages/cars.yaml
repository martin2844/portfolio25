  - make: "Ford"
    model: "Sierra XR4"
    year: 1984
    description: "Initially bought this car for the roadtrip through Argentina. We rebuilt the engine with some friends, and it was running great. Unfortunately I lacked experience at the time to know that these cars are a huge pit. You fix one thing and two break. The day we were supposed to leave for the roadtrip, we had some major damage on the suspension and decided to call it off and just take my gol."
