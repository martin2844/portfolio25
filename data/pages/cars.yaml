  - make: "Volkswagen"
    model: "Golf R32"
    year: 2006
    description: "The GOAT. I love this one. AWD, 250hp, Vr6 engine packed in a small factor. Comfy, looks amazing with the 18 inch stock wheels. Real fast and agile. When I moved to Spain I had some cars in sight, but the Golf was the perfect mix between fun, speed, comfy and low key looks. Still enjoying it today"
