  - make: "Nissan"
    model: "NX2000"
    year: 1991
    description: "Bought this car used, I paid 5000USD for it. It was in great condition. I dreamt about owning one of these for years, and when I finally got it felt like a dream. It was a big effort for me at the time to splurge on this car, as I knew if it turned out unreliable it would bankrupt me. Fortunately, it only had some minor issues in the 3 years I owned it, and I daily drove it. Also took me to work and school every day. The dashboard was in mph which was an odity, but the car was imported from the US. An amazing car with the T-tops, felt great to drive on summer. I cried when I sold it, it was a part of my heart. I still think about it often."
