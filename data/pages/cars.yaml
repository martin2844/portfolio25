  - make: "Audi"
    model: "A3 1.8T"
    year: 2001
    description: "Always loved the A3, and I figured it be great to get my first turbocharged car. This one had 180hp stock, and it was a bit tuned by the owner. It was quick, and fun to drive, a little bit low. Had a lot of fun with it, and it was comfy as well. Did some trips like Cordoba, and Punta del este as well. Added some RGB glow for some NFSU2 nostalgia. Sold it before moving to Spain"
