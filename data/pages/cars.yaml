  - make: "Peugeot"
    model: "206"
    year: 2005
    description: "Always loved these ones, bought one of them while I still owned the NX, because the NX had become a little bit fragile. This one had only 50k km, because it was owned by an old lady how didnt drive much, RIP. Bought it for 3k. The tires were almost 15 years old, and I drove them for 500km home. Very nice looking car, and sleek all in black. Unfortunately it was really unreliable, with electrical issues every 3 months. I sold it quick"
