  - make: "Volkswagen"
    model: "Vento (Jetta) mk5 2.5l"
    year: 2007
    description: "This car was a loaner from my mom. I drove it for a year almost, I had sold my Gol and Sierra and was thinking what to do. In the end I gave it back and bought the NX. But it was a great car, lots of reaction, lots of space. Did some trips with it, from Buenos Aires to Florianopolis, and from BA to Punta del este. Very reliable as well, but lacked some character."
